<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUG DERIV - System Override</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#05050F', // Very dark navy/black
              surface: '#0B0E14', // Sidebar
              card: '#111625', // Card bg
              primary: '#2F80ED', // Blue
              secondary: '#FF782C', // Orange
              accent: '#00E5FF', // Cyan
              success: '#00D1FF', // Bright Cyan/Green mix
              danger: '#FF3D00', // Red
              muted: '#64748B',
              textMain: '#FFFFFF',
              textSec: '#8F9BBA',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'], // Added for code/hacker feel
            },
            boxShadow: {
              'glow': '0 0 20px rgba(47, 128, 237, 0.15)',
              'card': '0 4px 20px rgba(0, 0, 0, 0.2)',
              'neon-blue': '0 0 10px rgba(47, 128, 237, 0.5), 0 0 20px rgba(47, 128, 237, 0.3)',
              'neon-cyan': '0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.3)',
              'neon-red': '0 0 10px rgba(255, 61, 0, 0.5), 0 0 20px rgba(255, 61, 0, 0.3)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-down': 'slideDown 0.3s cubic-bezier(0, 0, 0.2, 1) forwards',
              'pulse-glow': 'pulseGlow 2s infinite',
              'glitch': 'glitch 1s linear infinite',
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #05050F;
        color: #E2E8F0;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #05050F; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1E2329; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2D3748; 
      }
      
      .glass-card {
        background: linear-gradient(180deg, rgba(22, 27, 46, 0.9) 0%, rgba(15, 18, 30, 0.95) 100%);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      }

      .glass-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        border-color: rgba(0, 229, 255, 0.2);
      }
      
      /* Glitch Effect */
      .glitch-text {
        position: relative;
      }
      .glitch-text::before,
      .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch-text::before {
        left: 2px;
        text-shadow: -1px 0 #ff00c1;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch-text::after {
        left: -2px;
        text-shadow: -1px 0 #00fff9;
        clip: rect(44px, 450px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim {
        0% { clip: rect(38px, 9999px, 81px, 0); }
        5% { clip: rect(66px, 9999px, 9px, 0); }
        10% { clip: rect(10px, 9999px, 80px, 0); }
        15% { clip: rect(89px, 9999px, 3px, 0); }
        20% { clip: rect(2px, 9999px, 26px, 0); }
        25% { clip: rect(14px, 9999px, 66px, 0); }
        30% { clip: rect(57px, 9999px, 34px, 0); }
        35% { clip: rect(18px, 9999px, 83px, 0); }
        40% { clip: rect(39px, 9999px, 62px, 0); }
        45% { clip: rect(81px, 9999px, 33px, 0); }
        50% { clip: rect(2px, 9999px, 96px, 0); }
        55% { clip: rect(54px, 9999px, 8px, 0); }
        60% { clip: rect(23px, 9999px, 19px, 0); }
        65% { clip: rect(69px, 9999px, 46px, 0); }
        70% { clip: rect(28px, 9999px, 78px, 0); }
        75% { clip: rect(6px, 9999px, 21px, 0); }
        80% { clip: rect(98px, 9999px, 14px, 0); }
        85% { clip: rect(41px, 9999px, 36px, 0); }
        90% { clip: rect(11px, 9999px, 92px, 0); }
        95% { clip: rect(56px, 9999px, 63px, 0); }
        100% { clip: rect(32px, 9999px, 7px, 0); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(11px, 9999px, 54px, 0); }
        10% { clip: rect(76px, 9999px, 32px, 0); }
        20% { clip: rect(4px, 9999px, 89px, 0); }
        30% { clip: rect(92px, 9999px, 18px, 0); }
        40% { clip: rect(25px, 9999px, 67px, 0); }
        50% { clip: rect(61px, 9999px, 4px, 0); }
        60% { clip: rect(38px, 9999px, 91px, 0); }
        70% { clip: rect(82px, 9999px, 22px, 0); }
        80% { clip: rect(15px, 9999px, 74px, 0); }
        90% { clip: rect(53px, 9999px, 11px, 0); }
        100% { clip: rect(9px, 9999px, 65px, 0); }
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes slideLeft {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
      }

      .animate-enter-row {
        animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-enter-log {
        animation: slideLeft 0.3s ease-out forwards;
      }
    </style>

</head>

</html>
